{{ if eq .Values.configApplication "cert-manager" }}

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt
  labels:
    {{- include "aks-baseline.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: '1'
spec:
  acme:
    email: {{ .Values.apps.certManager.letsencryptContactEmail | quote }}
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx

{{ end }}
